<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Репостер{% endblock %}</title>
  <style>
    /* ── CSS-змінні темної теми ── */
    :root {
      --bg:          #0d0d1a;   /* найтемніший фон */
      --surface:     #1a1a2e;   /* фон бічної панелі та хедера */
      --card:        #1e1e35;   /* фон картки поста */
      --card-hover:  #252548;   /* картка при наведенні */
      --border:      #2d2d50;   /* роздільники */

      --accent:      #818cf8;   /* індиго — основний акцент */
      --accent-glow: rgba(129,140,248,.12);
      --purple:      #c084fc;   /* фіолетовий — бейдж "переписано" */

      --text:        #e2e8f0;   /* основний текст */
      --text-dim:    #94a3b8;   /* другорядний текст */
      --text-muted:  #64748b;   /* підказки, дати */

      --green:       #4ade80;
      --green-dim:   rgba(74,222,128,.12);
      --red:         #f87171;
      --red-dim:     rgba(248,113,113,.12);
      --yellow:      #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    button, input, textarea, select { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* Тонкий скролбар у темній темі */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
